name: food-allergy-app
app: node@20

options:
  env:
    - name: NODE_ENV
      value: production
    - name: TZ
      value: Asia/Seoul
  ports: 3001
  install:
    - npm --prefix frontend ci --include=dev
    - npm --prefix backend ci
  build: npm --prefix frontend run build && npm --prefix backend run build
  start: node backend/dist/index.js

context:
  preset: node.js
