databases:
  - name: food-allergy-db
    databaseName: food_allergy
    plan: free

services:
  - type: web
    name: food-allergy-app
    runtime: node
    plan: free
    rootDir: .
    buildCommand: |
      cd frontend && npm ci --include=dev && npm run build
      cd ../backend && npm ci --include=dev && npm run build
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: TZ
        value: Asia/Seoul
      - key: DATABASE_URL
        fromDatabase:
          name: food-allergy-db
          property: connectionString
      - key: NEIS_API_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_EMAIL
        sync: false
